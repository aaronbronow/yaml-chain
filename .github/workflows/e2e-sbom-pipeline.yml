name: "Security: Cryptographic SBOM & E2E Validation"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag name for manual release testing (e.g., test-release)'
        required: true
        default: 'test-release'

# Force strict minimal permissions for the ambient GITHUB_TOKEN
permissions:
  contents: write      # Required to create/update releases and upload assets
  id-token: write      # Required to generate artifact attestations using Sigstore
  packages: write      # Required to publish secure ledger OCI packages to GHCR
  attestations: write  # Required to generate artifact attestations using Sigstore

jobs:
  run-validation-suites:
    name: "Run Shared Multi-Parser Test Suite"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Repository Source"
        uses: actions/checkout@v4
        
      - name: "Set up Node.js Environment"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: "Install & Run Parser Validation Suite"
        run: |
          make clean
          make build
          make test

  prove-hardened-pipeline:
    name: "Prove Hardened OCI Attestation Pipeline"
    runs-on: ubuntu-latest
    needs: run-validation-suites
    # Only run release steps on tag pushes OR manual workflow dispatches
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: "Checkout Repository Source"
        uses: actions/checkout@v4

      - name: "Set up Node.js Environment"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Determine Release Tag"
        id: tag_picker
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: "Build Parsers & Package Binary"
        run: |
          make build
          mkdir -p dist
          tar -czf dist/yaml-chain-bin.tar.gz node-parser yaml-parser bash-parser ys-parser

      - name: "Create Cryptographic Attestation Block"
        run: |
          # Compute artifact SHA-256
          ASSET_HASH=$(sha256sum dist/yaml-chain-bin.tar.gz | awk '{print $1}')
          echo "Asset Hash: $ASSET_HASH"
          
          # Initialize ledger (or use existing)
          node node-parser/bin/yaml-chain.js init chain.yaml -d $'version: 1.0.0\nproject: yaml-chain-pipeline\nmessage: "Genesis block for attested release pipeline."'
          
          # Construct and append attestation payload
          ATTESTATION_PAYLOAD=$(cat <<EOF
          build_attestation:
            asset_name: "yaml-chain-bin.tar.gz"
            asset_hash: "$ASSET_HASH"
            builder: "GitHub Actions Runner"
            timestamp: "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          EOF
          )
          node node-parser/bin/yaml-chain.js append chain.yaml -d "$ATTESTATION_PAYLOAD"
          
          # Construct and append version changes
          VERSION_PAYLOAD=$(cat <<EOF
          version: 1.1.0
          changes:
            - Native GitHub Actions security validation pipeline
            - Automatic attestation generation and ledger syncing
          EOF
          )
          node node-parser/bin/yaml-chain.js append chain.yaml -d "$VERSION_PAYLOAD"

      - name: "Generate SBOM Release Notes Changelog"
        run: |
          node node-parser/bin/yaml-chain.js changelog chain.yaml -o RELEASE_NOTES.md --owner ${{ github.repository_owner }}
          cat RELEASE_NOTES.md

      # Disabled OCI Steps for now (retaining code)
      - name: "Log in to GitHub Container Registry"
        if: false
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Disabled OCI Steps for now (retaining code)
      - name: "Build & Push OCI Ledger Artifact Image"
        if: false
        run: |
          # Generate scratch Dockerfile dynamically
          cat <<EOF > Dockerfile.artifact
          FROM scratch
          COPY dist/yaml-chain-bin.tar.gz /artifacts/yaml-chain-bin.tar.gz
          COPY chain.yaml /ledger/chain.yaml
          COPY RELEASE_NOTES.md /ledger/RELEASE_NOTES.md
          EOF
          
          IMAGE_TAG="ghcr.io/${{ github.repository }}/yaml-chain-ledger:latest"
          docker build -t $IMAGE_TAG -f Dockerfile.artifact .
          docker push $IMAGE_TAG

      - name: "Generate GitHub Artifact Attestation for Compiled Binary"
        uses: actions/attest@v4
        with:
          subject-path: "dist/yaml-chain-bin.tar.gz"

      - name: "Generate GitHub Artifact Attestation for secure SBOM Ledger"
        uses: actions/attest@v4
        with:
          subject-path: "chain.yaml"

      - name: "Enforce Security Attestation Gate (Verify Untampered)"
        run: |
          node node-parser/bin/yaml-chain.js verify-asset chain.yaml dist/yaml-chain-bin.tar.gz

      - name: "Simulate Tamper Attack & Verify Gate Rejection"
        run: |
          cp dist/yaml-chain-bin.tar.gz dist/yaml-chain-bin-tampered.tar.gz
          echo "## EVIL TAMPER ##" >> dist/yaml-chain-bin-tampered.tar.gz
          if node node-parser/bin/yaml-chain.js verify-asset chain.yaml dist/yaml-chain-bin-tampered.tar.gz; then
            echo "❌ Cryptographic gate failed to detect tamper!"
            exit 1
          else
            echo "✅ Security gate successfully blocked tampered binary!"
          fi

      - name: "Publish Assets to GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/yaml-chain-bin.tar.gz
            chain.yaml
            RELEASE_NOTES.md
          body_path: RELEASE_NOTES.md
          tag_name: ${{ steps.tag_picker.outputs.tag }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

